apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: profpay
spec:
  storageClassName: fast.ru-7a
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
